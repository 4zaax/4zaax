name: Generate Pacman Contribution Graph

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"
  
  # Allow manual triggers from the Actions tab
  workflow_dispatch:

  # Run on every push to the main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates the pacman svg files
      - name: generate-pacman-svg
        uses: abozanona/pacman-contri@v1.2.0
        with:
          github_user_name: ${{ github.repository_owner }}
          # The output files will be saved in the 'github-pages' branch
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Deploy the generated files to a separate branch so they can be linked
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
